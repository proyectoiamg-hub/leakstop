<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeakStop - Nube Activa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ENLACE A SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { darkBg: '#0B0F19', cardBg: '#151D30', accent: '#3B82F6', accentHover: '#2563EB' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; font-family: system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black tracking-tight text-white">Leak<span class="text-accent">Stop</span></span>
                    <span class="text-xs bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded font-mono">☁️ Nube Conectada</span>
                </div>
                <p class="text-sm text-slate-400 mt-1">Tus datos están seguros en la nube de Supabase.</p>
            </div>
            
            <div class="flex gap-4 w-full md:w-auto">
                <div class="bg-cardBg border border-slate-800 p-3 rounded-xl flex items-center gap-3 flex-1 md:flex-initial">
                    <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Total Rescatado</p>
                        <p class="text-lg font-bold text-white font-mono" id="totalEarnings">$0.00</p>
                    </div>
                </div>
                <div class="bg-cardBg border border-slate-800 p-3 rounded-xl flex items-center gap-3 flex-1 md:flex-initial">
                    <div>
                        <label class="text-xs text-slate-400 uppercase tracking-wider font-semibold block">Valor Hora (USD)</label>
                        <input type="number" id="hourlyRate" value="30" class="w-16 bg-transparent text-lg font-bold text-white font-mono focus:outline-none focus:text-accent" onchange="updateMetrics()">
                    </div>
                </div>
            </div>
        </header>

        <!-- MAIN INTERFACE -->
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <!-- THE COMMAND BAR -->
                <div class="bg-cardBg border border-slate-800 p-4 rounded-2xl shadow-xl focus-within:border-accent transition-all">
                    <div class="flex items-center gap-2 mb-2 text-xs text-slate-400 font-mono">
                        <span class="bg-slate-800 px-1.5 py-0.5 rounded text-accent">Comando</span>
                        <span>Usa: <b class="text-slate-300">/cliente minutos descripción</b></span>
                    </div>
                    <form id="commandForm" onsubmit="handleCommand(event)" class="flex gap-2">
                        <input type="text" id="commandInput" autocomplete="off" placeholder="Ej: /acme 20m Corregir estilos del menú" class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-accent text-sm md:text-base">
                        <button type="submit" class="bg-accent hover:bg-accentHover text-white px-5 rounded-xl font-medium text-sm transition-colors shadow-lg shadow-accent/20 shrink-0">
                            Registrar
                        </button>
                    </form>
                </div>

                <!-- TASK FEED -->
                <div class="bg-cardBg border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                    <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                        <h2 class="font-bold text-white flex items-center gap-2">
                            Historial en la Nube
                            <span id="taskCount" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full font-mono">0</span>
                        </h2>
                        <button onclick="exportToCSV()" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg font-medium transition-colors border border-slate-700 flex items-center gap-1">
                            Exportar CSV
                        </button>
                    </div>
                    <div id="taskList" class="divide-y divide-slate-800/60 max-h-[500px] overflow-y-auto">
                        <div class="p-8 text-center text-slate-500 text-sm">Conectando con Supabase...</div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="space-y-6">
                <div class="bg-cardBg border border-slate-800 p-5 rounded-2xl shadow-xl">
                    <h3 class="font-bold text-white mb-4 text-sm uppercase tracking-wider text-slate-400">Acumulado por Cliente</h3>
                    <div id="clientList" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-xl shadow-2xl transition-all translate-y-20 opacity-0 pointer-events-none text-sm z-50"></div>

    <script>
        // =========================================================
        // 🔑 CONFIGURACIÓN DE TU BASE DE DATOS (REEMPLAZA AQUÍ)
        // =========================================================
        const SUPABASE_URL = "https://uukezcuuinvsltqjoxma.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1a2V6Y3V1aW52c2x0cWpveG1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDYxMTUsImV4cCI6MjA5NzI4MjExNX0.M5jdIgJyfdzaihvgP5dtFASAP_2S9sByRMLwBp84zKc";
        
        // Inicializar cliente de Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let tasks = [];
        let clients = ['General', 'Sin Clasificar'];

        // CARGAR DATOS AL INICIAR
        document.addEventListener('DOMContentLoaded', () => {
            fetchTasks();
        });

        // LEER DE LA NUBE
        async function fetchTasks() {
            const { data, error } = await supabaseClient
                .from('tasks')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                showToast("❌ Error al conectar con Supabase");
                console.error(error);
            } else {
                tasks = data;
                // Extraer clientes dinámicamente de las tareas existentes
                tasks.forEach(t => {
                    if (!clients.includes(t.client)) clients.push(t.client);
                });
                renderApp();
            }
        }

        // ENVIAR A LA NUBE
        async function handleCommand(e) {
            e.preventDefault();
            const input = document.getElementById('commandInput').value.trim();
            if (!input) return;

            let client = 'Sin Clasificar';
            let minutes = 15;
            let description = input;

            const commandRegex = /^\/([a-zA-Z0-9_-]+)\s+(\d+)(m|min|h)?\s+(.*)$/i;
            const match = input.match(commandRegex);

            if (match) {
                const parsedClient = match[1];
                const timeValue = parseInt(match[2]);
                const timeUnit = match[3] || 'm';
                description = match[4];
                minutes = (timeUnit.toLowerCase() === 'h') ? timeValue * 60 : timeValue;
                client = parsedClient.charAt(0).toUpperCase() + parsedClient.slice(1);
            }

            // GUARDAR EN SUPABASE
            const { data, error } = await supabaseClient
                .from('tasks')
                .insert([{ client: client, minutes: minutes, description: description }])
                .select();

            if (error) {
                showToast("❌ No se pudo guardar en la nube");
                console.error(error);
            } else {
                tasks.unshift(data[0]);
                if (!clients.includes(client)) clients.push(client);
                document.getElementById('commandInput').value = '';
                renderApp();
                showToast("☁️ Guardado en Supabase");
            }
        }

        // BORRAR DE LA NUBE
        async function deleteTask(id) {
            const { error } = await supabaseClient
                .from('tasks')
                .delete()
                .eq('id', id);

            if (error) {
                showToast("❌ No se pudo eliminar");
            } else {
                tasks = tasks.filter(t => t.id !== id);
                renderApp();
                showToast("🗑️ Registro eliminado de la nube");
            }
        }

        // RENDER UI
        function renderApp() {
            const taskList = document.getElementById('taskList');
            const clientList = document.getElementById('clientList');
            taskList.innerHTML = '';
            clientList.innerHTML = '';
            document.getElementById('taskCount').innerText = tasks.length;

            if (tasks.length === 0) {
                taskList.innerHTML = `<div class="p-8 text-center text-slate-500 text-sm"><p>No hay tareas en la nube.</p></div>`;
                return;
            }

            const clientTotals = {};
            clients.forEach(c => clientTotals[c] = 0);

            tasks.forEach(task => {
                if (!clientTotals[task.client]) clientTotals[task.client] = 0;
                clientTotals[task.client] += task.minutes;

                const isUnassigned = task.client === 'Sin Clasificar';
                const taskDate = new Date(task.created_at || Date.now()).toLocaleDateString('es-AR', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                
                const taskHtml = `
                    <div class="p-4 hover:bg-slate-800/30 transition-colors flex justify-between items-start gap-4">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <span class="px-2 py-0.5 rounded text-xs font-mono font-semibold ${isUnassigned ? 'bg-amber-500/10 text-amber-400' : 'bg-blue-500/10 text-blue-400'}">${task.client}</span>
                                <span class="text-xs text-slate-500">${taskDate}</span>
                            </div>
                            <p class="text-sm text-slate-200">${task.description}</p>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <span class="text-sm font-mono font-bold text-white bg-slate-900 border border-slate-800 px-2 py-1 rounded-lg">${task.minutes} min</span>
                            <button onclick="deleteTask(${task.id})" class="text-slate-500 hover:text-rose-400 p-1 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>`;
                taskList.insertAdjacentHTML('beforeend', taskHtml);
            });

            Object.keys(clientTotals).forEach(clientName => {
                const mins = clientTotals[clientName];
                if (mins === 0) return;
                const hours = (mins / 60).toFixed(1);
                const rate = parseFloat(document.getElementById('hourlyRate').value) || 0;
                const clientValue = (hours * rate).toFixed(2);

                const clientHtml = `
                    <div class="flex justify-between items-center bg-slate-900/50 border border-slate-800 p-3 rounded-xl">
                        <div><p class="text-sm font-medium text-white">${clientName}</p><p class="text-xs text-slate-400 font-mono">${mins} mins (~${hours}h)</p></div>
                        <span class="text-sm font-bold text-emerald-400 font-mono">$${clientValue}</span>
                    </div>`;
                clientList.insertAdjacentHTML('beforeend', clientHtml);
            });

            updateMetrics();
        }

        function updateMetrics() {
            const rate = parseFloat(document.getElementById('hourlyRate').value) || 0;
            const totalMinutes = tasks.reduce((sum, task) => sum + task.minutes, 0);
            const totalUSD = ((totalMinutes / 60) * rate).toFixed(2);
            document.getElementById('totalEarnings').innerText = `$${totalUSD} USD`;
        }

        function exportToCSV() {
            if (tasks.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Fecha,Cliente,Minutos,Descripcion\n";
            tasks.forEach(t => { csvContent += `"${t.created_at}","${t.client}",${t.minutes},"${t.description}"\n`; });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `leakstop_nube.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none'); }, 3000);
        }
    </script>
</body>
</html>
